# 强化学习算法通用配置
rl:
  algorithm: "A2C"

  # 通用超参
  seed: 42
  num_envs: 1                  # 并行环境数
  num_episodes: 5000    # 训练回合数
  total_timesteps: 1_000_000
  log_interval: 200               # 每多少步记录一次日志
  save_freq: 100            # 每多少回合保存一次模型
  continue_a2c: False    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_a2c: 'checkpoints/20260131/a2c-v1.0_Town06_Opt_020547_episode=4000.pth'
  continue_ocp: True    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_ocp: 'checkpoints/20260316/ocp-v1.0_Town06_Opt_235303_episode=100.pth'
  num_eps_eval: 10    # 评估步数

  A2C:
    lr_actor: 3e-3
    lr_critic: 8e-3
    gamma: 0.99
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    hidden_dim: 256
    min_start_train: 5    # 最小启动训练样本数
    total_capacity: 4096  # 缓冲区容量
    batch_size: 2048   # n-step

  OCP:
    gamma: 1.0  # 有限时域OCP无折扣，必须设为1，和论文OCP等价
    amplifier_c: 1.05  # 放大系数调大，减少放大次数，给每个ρ足够优化时间
    amplifier_m: 1000  # 每1000步更新一次Actor，给当前ρ足够的优化步数
    lr_actor: 3e-4  # 提高Actor学习率，保证每次优化能有效收敛
    lr_critic: 1e-3
    init_penalty: 1.0
    max_penalty: 50.0  # 降低最大惩罚，避免约束项完全主导损失
    hidden_dim: 256
    other_car_min_distance: 2.0
    road_min_distance: 1.0
    min_start_train: 2000  # 先收集足够样本，再启动训练
    total_capacity: 100000
    batch_size: 256
    horizon: 25  # 和论文完全一致，25步=2.5s
    dt: 0.1  # 和Carla仿真步长对齐


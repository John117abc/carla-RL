# 强化学习算法通用配置
rl:
  algorithm: "A2C"

  # 通用超参
  seed: 42
  num_envs: 1                  # 并行环境数
  num_episodes: 5000    # 训练回合数
  total_timesteps: 1_000_000
  log_interval: 500               # 每多少步记录一次日志
  save_freq: 100            # 每多少回合保存一次模型
  continue_a2c: False    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_a2c: 'checkpoints/20260131/a2c-v1.0_Town06_Opt_020547_episode=4000.pth'
  continue_ocp: False    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_ocp: 'checkpoints/20260314/ocp-v1.0_Town06_Opt_071734_episode=5000.pth'
  num_eps_eval: 10    # 评估步数

  A2C:
    lr_actor: 3e-3
    lr_critic: 8e-3
    gamma: 0.99
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    hidden_dim: 256
    min_start_train: 1    # 最小启动训练样本数
    total_capacity: 4096  # 缓冲区容量
    batch_size: 2048   # n-step

  OCP:
    gamma: 0.95
    amplifier_c: 1.05
    amplifier_m: 500      # 【关键】每500次迭代才更新一次Actor
    lr_actor: 0.0001
    lr_critic: 0.0005     # 【关键】提高Critic学习率
    init_penalty: 0.5      # 【关键】降低初始惩罚
    max_penalty: 20.0      # 【关键】降低最大惩罚
    hidden_dim: 256
    other_car_min_distance: 1.0
    road_min_distance: 0.5
    min_start_train: 1
    total_capacity: 500000
    batch_size: 256
    horizon: 10            # 【关键】缩短预测时域到10步
    dt: 0.1                # 【关键】和Carla仿真步长对齐


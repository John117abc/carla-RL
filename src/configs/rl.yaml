# 强化学习算法通用配置
rl:
  algorithm: "A2C"

  # 通用超参
  seed: 42
  num_envs: 1                  # 并行环境数
  num_episodes: 5000    # 训练回合数
  total_timesteps: 1_000_000
  log_interval: 100               # 每多少步记录一次日志
  save_freq: 5            # 每多少回合保存一次模型
  continue_a2c: False    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_a2c: 'checkpoints/20260131/a2c-v1.0_Town06_Opt_020547_episode=4000.pth'
  continue_ocp: True    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_ocp: 'checkpoints/20260328/ocp-v1.0_Town06_Opt_233201_episode=5.pth'
  num_eps_eval: 10    # 评估步数

  A2C:
    lr_actor: 3e-3
    lr_critic: 8e-3
    gamma: 0.99
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    hidden_dim: 256
    min_start_train: 5    # 最小启动训练样本数
    total_capacity: 4096  # 缓冲区容量
    batch_size: 2048   # n-step

  OCP:
    gamma: 1.0  # 有限时域OCP必须无折扣，和论文完全一致
    amplifier_c: 1.1  # 还原论文的1.1放大系数，加快约束生效
    amplifier_m: 2000  # 每10000步放大一次，给网络足够时间学习跟踪，再加约束
    lr_actor: 3e-4  # 保持不变
    lr_critic: 8e-4  # 还原论文的8e-4，加快价值网络收敛
    init_penalty: 0.1  # 初始惩罚因子调小，先学跟踪再学安全约束
    max_penalty: 100.0  # 放大最大惩罚因子，保证约束最终生效
    hidden_dim: 256
    other_car_min_distance: 3.0
    road_min_distance: 1.0
    min_start_train: 1024  # 先收集10000步随机样本，再开始训练
    total_capacity: 500000  # 还原论文的5e5缓冲区大小
    batch_size: 512  # 放大batch_size，提升训练稳定性
    horizon: 25  # 和论文完全一致，25步=2.5s
    dt: 0.1  # 和Carla仿真步长对齐



# 强化学习算法通用配置
rl:
  algorithm: "A2C"

  # 通用超参
  seed: 42
  num_envs: 1                  # 并行环境数
  num_episodes: 5000    # 训练回合数
  total_timesteps: 1_000_000
  log_interval: 100               # 每多少步记录一次日志
  save_freq: 100            # 每多少回合保存一次模型
  continue_a2c: False    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_a2c: 'checkpoints/20260131/a2c-v1.0_Town06_Opt_020547_episode=4000.pth'
  continue_ocp: False    # 是否继续训练，如果需要继续训练，则需要填写模型地址
  model_path_ocp: 'checkpoints/20260316/ocp-v1.0_Town06_Opt_235303_episode=100.pth'
  num_eps_eval: 10    # 评估步数

  A2C:
    lr_actor: 3e-3
    lr_critic: 8e-3
    gamma: 0.99
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    hidden_dim: 256
    min_start_train: 5    # 最小启动训练样本数
    total_capacity: 4096  # 缓冲区容量
    batch_size: 2048   # n-step

  OCP:
    gamma: 1.0  # 有限时域OCP必须无折扣，和论文完全一致
    amplifier_c: 1.05  # 惩罚因子放大系数
    amplifier_m: 5000  # 每5000步放大一次惩罚因子，先学跟踪再加约束
    lr_actor: 3e-4  # Actor学习率
    lr_critic: 1e-3  # Critic学习率
    init_penalty: 1.0  # 初始惩罚因子
    max_penalty: 10.0  # 最大惩罚因子
    hidden_dim: 256
    other_car_min_distance: 2.0
    road_min_distance: 1.0
    min_start_train: 2000  # 20000步后再开始训练，先收集随机动作的正样本
    total_capacity: 200000
    batch_size: 256
    horizon: 25  # 和论文完全一致，25步=2.5s
    dt: 0.1  # 和Carla仿真步长对齐

